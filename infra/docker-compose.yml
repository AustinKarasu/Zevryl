services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zevryl
      POSTGRES_USER: zevryl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zevryl}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
  api:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm ci && npm --workspace @zevryl/api run build && npm --workspace @zevryl/api start"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://zevryl:${POSTGRES_PASSWORD:-zevryl}@postgres:5432/zevryl
      REDIS_URL: redis://redis:6379
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
    ports:
      - "4100:4100"
    depends_on:
      - postgres
      - redis
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

volumes:
  postgres_data:
  redis_data:
  node_modules:
